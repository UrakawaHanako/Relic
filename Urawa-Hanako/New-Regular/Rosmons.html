<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rosmons Viewer</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100vh;
      width: 100vw;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    img#viewer {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    /* Tombol navigasi */
    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.4);
      color: #fff;
      border: none;
      font-size: 2rem;
      padding: 12px 18px;
      cursor: pointer;
      border-radius: 8px;
    }

    .nav-btn:hover {
      background: rgba(0,0,0,0.7);
    }

    #prevBtn { left: 10px; }
    #nextBtn { right: 10px; }

    #randomBtn {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.4);
      font-size: 1.5rem;
    }

    #backBtn {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(0,0,0,0.4);
      font-size: 1.2rem;
    }
  </style>
</head>
<body>
  <img id="viewer" alt="viewer" />

  <button id="prevBtn" class="nav-btn" onclick="prevImage()">⏮</button>
  <button id="nextBtn" class="nav-btn" onclick="nextImage()">⏭</button>
  <button id="randomBtn" onclick="randomImage()">🎲 Acak</button>
  <button id="backBtn">🔙 Back</button>

  <script src="js/image_viewer.js"></script>
<script>
  // Ambil index dari localStorage
  let idx = parseInt(localStorage.getItem("currentIndex")) || 0;
  currentIndex = idx;  // pakai variabel global dari viewer.js
  showImage(currentIndex);
</script>

</body>
</html>

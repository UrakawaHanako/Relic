<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Induk</title>
    <link rel="stylesheet" href="fontawesome/css/all.min.css"> <!-- https://fontawesome.com/ -->
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro&display=swap" rel="stylesheet">
    <!-- https://fonts.google.com/ -->
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/templatemo-video-catalog.css">
    <style>
		/* Related cards styling */
		.related-card {
		border-radius: 12px;
		overflow: hidden;
		background: #fff;
		box-shadow: 0 4px 10px rgba(0,0,0,0.08);
		transition: transform 0.15s ease, box-shadow 0.2s ease;
		margin-bottom: 20px;
		}
		.related-card:hover {
		transform: translateY(-6px);
		box-shadow: 0 10px 20px rgba(0,0,0,0.12);
		}
		.related-thumb {
		height: 160px;
		width: 100%;
		object-fit: cover;
		display: block;
		}
		.overlay-play {
		position: absolute;
		top: 50%;
		left: 50%;
		transform: translate(-50%, -50%);
		font-size: 32px;
		color: rgba(255,255,255,0.95);
		opacity: 0;
		transition: 0.18s ease;
		pointer-events: none;
		text-shadow: 0 2px 6px rgba(0,0,0,0.45);
		}
		.related-card:hover .overlay-play { opacity: 1; pointer-events: auto; }
		.related-meta { padding: 8px 10px; }
		.related-title { font-size: 14px; margin: 0; text-align: center; word-break: break-word; }
		.tm-catalog-item-list .col-lg-4 { display: flex; flex-direction: column; }
	</style>
</head>
<body>
<div class="row pt-4 pb-5">
	<div class="col-12">
		<h2 class="mb-5 tm-text-primary">Related Videos for You</h2>
		<div class="row tm-catalog-item-list" id="related-container"></div>

	</div>
</div>
<script src="js/viewer.js"></script>    
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const container = document.getElementById("related-container");

        videos.forEach((videoPath, index) => {
            const filename = videoPath.split("/").pop();

            const html = `
            <div class="col-lg-4 col-md-6 col-sm-12 tm-catalog-item">
                <div class="position-relative tm-thumbnail-container">
                    <video width="100%" class="img-fluid tm-catalog-item-img">
                        <source src="${videoPath}" type="video/mp4">
                    </video>
                    <a href="video-page.html?vid=${index}" class="position-absolute tm-img-overlay">
                        <i class="fas fa-play tm-overlay-icon"></i>
                    </a>
                </div>
                <div class="p-3 tm-catalog-item-description">
                    <h3 class="tm-text-gray text-center tm-catalog-item-title">${filename}</h3>
                </div>
            </div>
            `;

            container.insertAdjacentHTML("beforeend", html);
        });
    });
</script>
</body>
</html>

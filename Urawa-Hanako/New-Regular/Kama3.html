<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Gallery</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 12px;
    background-color: #f9f9f9;
  }

  h1 {
    text-align: center;
    margin: 10px 0 16px;
    font-size: 1.4rem;
  }

  .gallery {
    display: grid;
    grid-template-columns: repeat(2, 1fr); /* mobile default */
    gap: 10px;
  }

  @media (min-width: 600px) {
    .gallery {
      grid-template-columns: repeat(3, 1fr);
    }
  }

  @media (min-width: 900px) {
    .gallery {
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    }
  }

  .photo-container {
    position: relative;
    overflow: hidden;
    border-radius: 8px;
    background-color: #fff;
  }

  .photo-container img {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    display: block;
  }

  .photo-title {
    position: absolute;
    bottom: 6px;
    left: 6px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 4px;
  }

  button {
    margin-top: 16px;
    padding: 8px 12px;
  }

  button a {
    text-decoration: none;
    color: inherit;
  }
</style>
</head>

<body>
<h1>Photo Gallery</h1>

<div class="gallery" id="gallery"></div>
<div style="display:flex; gap:10px; justify-content:center; margin:16px 0;">
  <button id="prevBtn">Previous</button>
  <span id="pageInfo"></span>
  <button id="nextBtn">Next</button>
</div>
<button><a href="index.html">Return</a></button>

<script src="viewer.js"></script>
<script>
  const gallery = document.getElementById("gallery");
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  const pageInfo = document.getElementById("pageInfo");

  const ITEMS_PER_PAGE = 20;
  let currentPage = 0;

  function renderGallery() {
    gallery.innerHTML = "";

    const start = currentPage * ITEMS_PER_PAGE;
    const end = start + ITEMS_PER_PAGE;
    const pageImages = images.slice(start, end);

    pageImages.forEach((src, index) => {
      const item = document.createElement("div");
      item.className = "photo-container";

      item.innerHTML = `
        <a href="${src}" target="_blank">
          <img src="${src}" loading="lazy" alt="Photo ${start + index + 1}">
        </a>
        <div class="photo-title">Photo ${start + index + 1}</div>
      `;

      gallery.appendChild(item);
    });

    const totalPages = Math.ceil(images.length / ITEMS_PER_PAGE);
    pageInfo.textContent = `Page ${currentPage + 1} / ${totalPages}`;

    prevBtn.disabled = currentPage === 0;
    nextBtn.disabled = currentPage >= totalPages - 1;
  }

  prevBtn.onclick = () => {
    if (currentPage > 0) {
      currentPage--;
      renderGallery();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  };

  nextBtn.onclick = () => {
    const totalPages = Math.ceil(images.length / ITEMS_PER_PAGE);
    if (currentPage < totalPages - 1) {
      currentPage++;
      renderGallery();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  };

  renderGallery();
</script>

</body>
</html>

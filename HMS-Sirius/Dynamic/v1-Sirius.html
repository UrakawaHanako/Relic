<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sirius Viewer</title>

    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            background: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h3 {
            margin-top: 20px;
        }

        /* Layout utama */
        .content-wrap {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            margin-top: 20px;
            padding: 20px;
            width: 100%;
            max-width: 1200px;
            box-sizing: border-box;
        }

        /* Iframe */
        iframe {
            border: 1px solid black;
            width: 800px;
            height: 400px;
            border-radius: 8px;
        }

        /* Viewer container */
        .viewer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        img#viewer {
            max-width: 100%;
            max-height: 400px;
            border: 2px solid #444;
            border-radius: 12px;
            background: #000;
            object-fit: contain;
        }

        /* Button controls */
        .controls {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 14px;
            font-size: 15px;
            border: none;
            border-radius: 8px;
            background: #444;
            color: #fff;
            cursor: pointer;
        }

        button:hover {
            background: #666;
        }

        /* Mobile friendly */
        @media (max-width: 900px) {
            .content-wrap {
                flex-direction: column;
                align-items: center;
            }

            iframe {
                width: 95%;
                height: 300px;
            }

            img#viewer {
                max-height: 300px;
            }
        }
    </style>
</head>

<body>
    <p>Proyek sejauh ini adalah implementasi ke bidang Psikologi dengan pendekatan Ekonomi</p>

    <h3>Kwitansi Mental</h3>
    <p>Mengubah beban emosi subjektif <i>(Qualitative)</i> menjadi terukur <i>(Quantitative)</i>.</p>

    <div class="content-wrap">

        <iframe 
            src="https://openparliament.id/daftar-anggota-dpr/" 
            loading="lazy">
        </iframe>

        <div class="viewer-container">
            <img id="viewer" alt="viewer">

            <div class="controls">
                <button onclick="prevImage()">⏮ Sebelumnya</button>
                <button onclick="nextImage()">⏭ Selanjutnya</button>
                <button onclick="randomImage()">🎲 Acak</button>
            </div>
        </div>

    </div>

    <script src="v1-viewer.js"></script>
</body>
</html>
